<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="300">
    <title>Статус сервисов - Метро New</title>
    <link rel="shortcut icon" href="https://kirill12633.github.io/Metro.New.Official/ru/images/metro-icon.png" type="image/png">
    <link rel="apple-touch-icon" href="https://kirill12633.github.io/Metro.New.Official/ru/images/metro-icon.png">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
        .top-bar {
            padding: 10px;
            text-align: center;
            background: #f5f5f5;
            border-bottom: 1px solid #ddd;
        }
        .top-bar a {
            color: #667eea;
            text-decoration: none;
            margin: 0 10px;
        }
        .top-bar a:hover {
            text-decoration: underline;
        }
        .loader {
            text-align: center;
            padding: 50px;
            font-size: 18px;
            color: #666;
        }
        iframe {
            width: 100%;
            height: 800px;
            border: none;
        }
        .alt-link {
            text-align: center;
            padding: 15px;
            background: #f9f9f9;
            border-top: 1px solid #ddd;
        }
        .alt-link a {
            color: #667eea;
            text-decoration: none;
        }
        .alt-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <a href="https://kirill12633.github.io/Metro.New.Official/">← На главную</a>
    </div>

    <div id="loader" class="loader">
        ⏳ Загрузка статуса сервисов...
    </div>

    <iframe 
        src="https://metro_new.betteruptime.com" 
        onload="document.getElementById('loader').style.display='none'">
    </iframe>

    <div class="alt-link">
        📡 Не отображается статус? 
        <a href="https://metro_new.betteruptime.com" target="_blank">Открыть в новом окне →</a>
    </div>

</body>
</html>
